name: build

# private repo 의 macOS 러너는 분당 과금이 크므로(무료 분량 10배 소진),
# 일반 push 마다 돌지 않게 수동 실행과 버전 태그 push 에서만 빌드한다.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  macos:
    runs-on: macos-14 # Apple Silicon (arm64)
    permissions:
      contents: write # 태그 빌드 시 GitHub Release 생성/업로드에 필요
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build unsigned dmg + zip
        env:
          # 서명 인증서가 없으므로 자동 탐색을 끄고 미서명으로 빌드한다.
          # 인증서 준비 후에는 CSC_LINK/CSC_KEY_PASSWORD 와 공증 자격증명을 secrets 로 주입한다.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist

      - uses: actions/upload-artifact@v6
        with:
          name: ditto-macos-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      # v* 태그로 트리거된 경우에만 GitHub Release 를 만들고 산출물을 첨부한다.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/*.dmg release/*.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
